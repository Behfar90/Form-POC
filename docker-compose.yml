services:
  api:
    build: ./api
    environment:
      DB_PATH: /app/data/registrations.db
      CORS_ALLOW_ORIGINS: "http://localhost:3000"
    volumes:
      - sqlite_data:/app/data
    restart: unless-stopped

  app:
    build:
      context: ./app
      args:
        VITE_API_BASE_URL: ""
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  sqlite_data:
